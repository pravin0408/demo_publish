<!DOCTYPE html>
<html>
<head>
    <title>Automation Status</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            padding-top: 100px;
        }

        .card {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        .ok {
            color: green;
            font-size: 28px;
            font-weight: bold;
        }

        .sub {
            color: #555;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="ok">OK</div>
    <div class="sub">All systems are running fine</div>
</div>

</body>
</html>
